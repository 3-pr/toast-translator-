<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Translator</title>
    <link rel="stylesheet" href="/static/style.css?v=0.2.8">
    <script src="/static/utils.js?v=0.2.8"></script>
    <script src="/static/stremio.js?v=0.2.8"></script>
    <script src="/static/addonCard.js?v=0.2.8"></script>
    <script src="/static/installer.js?v=0.2.8"></script>
</head>

<body>

    <div class="container">
        <div class="title">
            <span class="toast">Toast</span>
            <span class="translator">Translator</span>
        </div>

        <div class="description" id="desc-head">
            <p>Premium Stremio catalog translator with BetterPoster support</p>
        </div>

        <!-- Section 1: Login -->
        <div id="login-section" class="config-group">
            <h2 style="text-align: center;">🔑 Login to Stremio</h2>
            <p style="font-size: 0.85rem; text-align: center; color: var(--text-muted);">Access your addons to start translating</p>
            <input type="email" id="stremio-email" placeholder="Stremio email">
            <input type="password" id="stremio-password" placeholder="Stremio password">
            <button onclick="stremioLogin()">Login & Start</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="/link_generator" class="generate-link-btn">🧩 Use Link Generator Instead</a>
            </p>
        </div>

        <!-- Section 2: Main App -->
        <div id="app-section" class="hidden">
            <div class="config-group">
                <h2>⚙️ Global Configuration</h2>
                
                <label for="tmdb-key">🔑 TMDB API Key (Required)</label>
                <input type="text" id="tmdb-key" placeholder="Enter your TMDB API key">

                <label for="language">🌍 Preferred Language</label>
                <select id="language"></select>
                <script src="/static/languages.js"></script>

                <!-- Simplified BetterPoster Section -->
                <div class="better-poster-config">
                    <h3 style="margin-top:0; color: var(--accent); display: flex; align-items: center; gap: 10px;">
                        🖼️ BetterPoster Support
                    </h3>
                    
                    <div style="display: flex; align-items: center; gap: 10px; padding-bottom: 10px;">
                        <input type="checkbox" id="better-poster-enabled" checked style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="better-poster-enabled" style="margin:0; cursor: pointer; font-weight: 600;">Enable BetterPoster Service</label>
                    </div>

                    <div id="poster-preview" style="text-align: center; margin-top: 10px;">
                        <img id="preview-img" src="https://btttr.cc/poster/imdb/poster-default/tt0111161.jpg?lang=ar" style="max-width: 160px; border-radius: 10px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">Standard BetterPoster Layout</p>
                    </div>
                </div>
                
                <label for="addon-url" style="margin-top: 10px;">🧩 Custom Addon URL</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="addon-url" placeholder="Addon manifest.json URL">
                    <button style="width: auto; margin:0;" onclick="loadAddon(document.getElementById('addon-url').value, true)">Add</button>
                </div>
            </div>

            <div id="addons-loader" class="loader hidden"></div>
            <div id="addons-container"></div>

            <div class="translate-button hidden" id="action-buttons">
                <button onclick="translateSelected(stremioUser.result.authKey, transteArray)">Apply Translation</button>
                <button style="background: var(--border);" onclick="reloadAddons(stremioUser.result.authKey)">Reload Addons</button>
            </div>
        </div>

        <div class="donation">
            <a href='https://ko-fi.com/S6S71MEJ1N' target='_blank'>
                <img height='36' src='https://storage.ko-fi.com/cdn/kofi4.png?v=6' alt='Support the project' />
            </a>
        </div>
    </div>

    <script>
        // Simple Login Flow
        const originalLogin = window.stremioLogin;
        window.stremioLogin = async function() {
            const success = await originalLogin();
            if (stremioUser && stremioUser.result && stremioUser.result.authKey) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
            }
        };

        document.querySelectorAll('#login-section input').forEach(input => {
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') stremioLogin(); });
        });
    </script>
</body>
</html>
