<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Translator</title>
    <link rel="stylesheet" href="/static/style.css?v=0.2.9">
    <script src="/static/utils.js?v=0.2.9"></script>
    <script src="/static/stremio.js?v=0.2.9"></script>
    <script src="/static/addonCard.js?v=0.2.9"></script>
    <script src="/static/installer.js?v=0.2.9"></script>
</head>

<body>
    <div class="container">
        <div class="title">
            <span class="toast">Toast</span>
            <span class="translator">Translator</span>
        </div>

        <!-- Section 1: Login -->
        <div id="login-section" class="config-group">
            <h2 style="text-align: center;">🔑 Stremio Login</h2>
            <input type="email" id="stremio-email" placeholder="Email">
            <input type="password" id="stremio-password" placeholder="Password">
            <button onclick="stremioLogin()">Login</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="/link_generator" class="generate-link-btn">🧩 Use Link Generator</a>
            </p>
        </div>

        <!-- Section 2: App -->
        <div id="app-section" class="hidden">
            <div class="config-group">
                <label for="tmdb-key">🔑 TMDB API Key</label>
                <input type="text" id="tmdb-key" placeholder="Enter TMDB API key">

                <label for="language">🌍 Translation Language</label>
                <select id="language"></select>
                <script src="/static/languages.js"></script>


                <label for="addon-url" style="margin-top: 15px;">🧩 Add Custom Addon</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="addon-url" placeholder="Addon URL">
                    <button style="width: auto; margin:0;" onclick="loadAddon(document.getElementById('addon-url').value, true)">Add</button>
                </div>
            </div>

            <div id="addons-loader" class="loader hidden"></div>
            <div id="addons-container"></div>

            <div class="addon-actions hidden" id="action-buttons" style="margin-top: 20px;">
                <button onclick="translateSelectedAddons()" style="background: var(--success);">Apply All Translations</button>
                <button onclick="reloadAddons(stremioUser.result.authKey)" style="background: var(--border);">Reload Addon List</button>
            </div>
        </div>

        <div class="donation">
            <a href='https://ko-fi.com/S6S71MEJ1N' target='_blank'>
                <img height='36' src='https://storage.ko-fi.com/cdn/kofi4.png?v=6' alt='Support the project' />
            </a>
        </div>
    </div>

    <script>
        var transteArray = [];

        async function translateSelectedAddons() {
            if (transteArray.length === 0) {
                showError("⚠️ Please select at least one addon first!");
                return;
            }

            const tmdbKey = document.getElementById("tmdb-key").value;
            if (!tmdbKey) {
                showError("⚠️ TMDB Key is required!");
                return;
            }

            showLoader();
            const authKey = stremioUser.result.authKey;
            const addonCollection = await stremioAddonCollectionGet(authKey);
            let currentAddons = addonCollection.result.addons;

            for (let addon of transteArray) {
                const newTransportUrl = generateTranslatorLink(
                    addon.transportUrl, 
                    addon.rpdb, 
                    '0', 
                    '0', 
                    addon.bp
                );
                
                // Find and update the addon in the collection
                const index = currentAddons.findIndex(a => a.transportUrl === addon.transportUrl);
                if (index !== -1) {
                    currentAddons[index].transportUrl = newTransportUrl;
                } else {
                    // If not found (manually added), add it
                    currentAddons.push({
                        transportUrl: newTransportUrl,
                        manifest: addon
                    });
                }
            }

            const response = await stremioAddonCollectionSet(authKey, currentAddons);
            hideLoader();

            if (response.result && response.result.success) {
                showSuccess("✅ All selected addons translated and synced!");
                setTimeout(() => { location.reload(); }, 2000);
            } else {
                showError("❌ Failed to sync with Stremio.");
            }
        }

        // Enter key for login
        document.querySelectorAll('#login-section input').forEach(input => {
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') stremioLogin(); });
        });
    </script>
</body>
</html>
