<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Translator - Link Generator</title>
    <link rel="stylesheet" href="/static/style.css?v=0.2.8">
    <script src="/static/utils.js?v=0.2.8"></script>
    <script src="/static/stremio.js?v=0.2.8"></script>
    <script src="/static/addonCard.js?v=0.2.8"></script>
    <script src="/static/installer.js?v=0.2.8"></script>
</head>

<body>
    <div class="container">
        <div class="title">
            <span class="toast">Stremio</span>
            <span class="translator">Arabic Plus</span>
        </div>
        <div class="description">
            <p>🧩 معالج الإضافات العربية (ترجمة + بوسترات)</p>
        </div>

        <div class="config-group">
            <label for="tmdb-key">🔑 TMDB API Key</label>
            <input type="text" id="tmdb-key" placeholder="Enter your TMDB API key">

            <label for="language">🌍 Preferred Language</label>
            <select id="language"></select>
            <script src="/static/languages.js"></script>

            <!-- Poster Options -->
            <div class="better-poster-config">
                <h3 style="margin-top:0; color: var(--accent); display: flex; align-items: center; gap: 10px;">
                    🖼️ Poster Options
                </h3>
                
                <div style="display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="better-poster-enabled" checked style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="better-poster-enabled" style="margin:0; cursor: pointer; font-weight: 600;">✨ BetterPoster</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="top-poster-enabled" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="top-poster-enabled" style="margin:0; cursor: pointer; font-weight: 600;">🎬 Top Poster API</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="tmdb-poster-enabled" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="tmdb-poster-enabled" style="margin:0; cursor: pointer; font-weight: 600;">🖼️ TMDB Poster</label>
                    </div>
                </div>

                <div id="top-key-group" class="hidden" style="margin-bottom: 15px;">
                    <label for="top-key">🔑 Top Poster API Key</label>
                    <input type="text" id="top-key" placeholder="Enter Top Poster Key (e.g. poster-qa)">
                </div>

                <div id="poster-previews" style="display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap;">
                    <div style="text-align: center;">
                        <p style="font-size: 0.8em; color: var(--accent); margin-bottom: 5px;">BetterPoster</p>
                        <img src="https://btttr.cc/poster/imdb/poster-default/tt0111161.jpg?lang=ar" style="max-width: 120px; border-radius: 10px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    </div>
                    <div style="text-align: center;">
                        <p style="font-size: 0.8em; color: var(--success); margin-bottom: 5px;">Top Poster</p>
                        <img src="https://api.top-streaming.stream/demo_TP-abc123/imdb/poster-default/tt0111161.jpg?badges=imdb,letterboxd,rogerebert&trend=up:5&lang=en&style=modern" style="max-width: 120px; border-radius: 10px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    </div>
                    <div style="text-align: center;">
                        <p style="font-size: 0.8em; color: #31b0d5; margin-bottom: 5px;">TMDB Poster</p>
                        <img src="https://www.themoviedb.org/t/p/w1280/KBUq6m4mWjNymPgNiflyKogSWS.jpg" style="max-width: 120px; border-radius: 10px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    </div>
                </div>

                <script>
                    const bpCheck = document.getElementById('better-poster-enabled');
                    const tpCheck = document.getElementById('top-poster-enabled');
                    const tmdbCheck = document.getElementById('tmdb-poster-enabled');
                    const topKeyGroup = document.getElementById('top-key-group');
                    
                    const checks = [bpCheck, tpCheck, tmdbCheck];
                    
                    checks.forEach(chk => {
                        chk.addEventListener('change', () => {
                            if (chk.checked) {
                                checks.forEach(other => { if (other !== chk) other.checked = false; });
                            }
                            topKeyGroup.classList.toggle('hidden', !tpCheck.checked);
                        });
                    });
                </script>
            </div>

            <label for="addon-url" style="margin-top: 20px;">🧩 Load Addon from URL</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="addon-url" placeholder="Addon manifest.json URL">
                <button style="width: auto; margin:0;" onclick="loadAddon(document.getElementById('addon-url').value, true, 'generator', true)">Add</button>
            </div>
        </div>

        <div id="addons-container"></div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/" class="generate-link-btn">🔙 Back to Configuration</a>
        </p>
    </div>

    <div class="donation">
        <a href='https://ko-fi.com/S6S71MEJ1N' target='_blank'>
            <img height='36' src='https://storage.ko-fi.com/cdn/kofi4.png?v=6' alt='Support the project' />
        </a>
    </div>
</body>
</html>
