<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio Arabic Plus - Link Generator</title>
    <link rel="stylesheet" href="/static/style.css?v=1.5">
    <script src="/static/utils.js?v=1.5"></script>
    <script src="/static/stremio.js?v=1.5"></script>
    <script src="/static/addonCard.js?v=1.5"></script>
    <script src="/static/installer.js?v=1.5"></script>
</head>

<body>
    <div class="container">
        <div class="title">
            <span class="toast">Stremio</span>
            <span class="translator">Arabic Plus</span>
        </div>
        <div class="description">
            <p>🧩 معالج الإضافات العربية (ترجمة + بوسترات)</p>
        </div>

        <div class="config-group">
            <label for="tmdb-key">🔑 مفتاح TMDB API</label>
            <input type="text" id="tmdb-key" placeholder="أدخل مفتاح TMDB الخاص بك">

            <label for="language">🌍 لغة الترجمة المفضلة</label>
            <select id="language"></select>
            <script src="/static/languages.js"></script>

            <!-- Poster Options -->
            <div class="better-poster-config">
                <h3 style="margin-top:0; color: var(--accent); display: flex; align-items: center; gap: 10px; font-size: 16px; margin-bottom: 12px;">
                    🖼️ خيارات البوستر
                </h3>
                
                <div style="display: flex; flex-direction: column; gap: 12px; padding-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="better-poster-enabled" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="better-poster-enabled" style="margin:0; cursor: pointer; font-size: 13px; color: var(--text-primary);">✨ تفعيل BetterPoster</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="top-poster-enabled" style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="top-poster-enabled" style="margin:0; cursor: pointer; font-size: 13px; color: var(--text-primary);">🎬 تفعيل Top Poster API</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="tmdb-poster-enabled" style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="tmdb-poster-enabled" style="margin:0; cursor: pointer; font-size: 13px; color: var(--text-primary);">🖼️ تفعيل TMDB Poster</label>
                    </div>
                </div>

                <div id="top-key-group" class="hidden" style="margin-top: 15px;">
                    <label for="top-key">🔑 مفتاح Top Poster API</label>
                    <input type="text" id="top-key" placeholder="مثال: poster-qa">
                </div>

                <div id="poster-previews" style="display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
                    <div style="text-align: center;">
                        <p style="font-size: 11px; color: var(--accent); margin-bottom: 5px;">BetterPoster</p>
                        <img src="https://btttr.cc/poster/imdb/poster-default/tt0111161.jpg?lang=ar" style="max-width: 110px; border-radius: 10px; border: 1px solid var(--border-card);">
                    </div>
                    <div style="text-align: center;">
                        <p style="font-size: 11px; color: var(--success); margin-bottom: 5px;">Top Poster</p>
                        <img src="https://api.top-streaming.stream/demo_TP-abc123/imdb/poster-default/tt0111161.jpg?badges=imdb,letterboxd,rogerebert&trend=up:5&lang=en&style=modern" style="max-width: 110px; border-radius: 10px; border: 1px solid var(--border-card);">
                    </div>
                    <div style="text-align: center;">
                        <p style="font-size: 11px; color: #31b0d5; margin-bottom: 5px;">TMDB Poster</p>
                        <img src="https://www.themoviedb.org/t/p/w1280/KBUq6m4mWjNymPgNiflyKogSWS.jpg" style="max-width: 110px; border-radius: 10px; border: 1px solid var(--border-card);">
                    </div>
                </div>

                <script>
                    const bpCheck = document.getElementById('better-poster-enabled');
                    const tpCheck = document.getElementById('top-poster-enabled');
                    const tmdbCheck = document.getElementById('tmdb-poster-enabled');
                    const topKeyGroup = document.getElementById('top-key-group');
                    
                    const checks = [bpCheck, tpCheck, tmdbCheck];
                    
                    checks.forEach(chk => {
                        chk.addEventListener('change', () => {
                            if (chk.checked) {
                                checks.forEach(other => { if (other !== chk) other.checked = false; });
                            }
                            topKeyGroup.classList.toggle('hidden', !tpCheck.checked);
                        });
                    });
                </script>
            </div>

            <label for="addon-url" style="margin-top: 20px;">🧩 جلب إضافة من رابط</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="addon-url" placeholder="رابط manifest.json الخاص بالإضافة">
                <button style="width: auto; margin:0; padding: 0 20px;" onclick="loadAddon(document.getElementById('addon-url').value, true, 'generator', true)">إضافة</button>
            </div>
        </div>

        <div id="addons-container"></div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px;">🔙 العودة لصفحة الإعدادات الرئيسية</a>
        </p>

        <!-- Support Card -->
        <a href="https://creators.sa/i" target="_blank" rel="noopener noreferrer" class="support-card" style="margin-top: 32px;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
            <span>دعم المشروع مادياً</span>
        </a>

        <!-- Footer & Mentions -->
        <div class="footer">
            <div class="mentions">
                <p>© 2026 جميع الحقوق محفوظة لـ <a href="https://github.com/3-pr" target="_blank">ياسر الحربي</a></p>
                <p style="margin-top: 8px; opacity: 0.7;">هذه الإضافة مبنية على الكود المصدري لـ <a href="https://github.com/diogomiguel93/toast-translator" target="_blank">Toast Translator</a></p>
            </div>
        </div>
    </div>

    <div class="donation hidden">
        <a href='https://ko-fi.com/S6S71MEJ1N' target='_blank'>
            <img height='36' src='https://storage.ko-fi.com/cdn/kofi4.png?v=6' alt='Support the project' />
        </a>
    </div>
</body>
</html>
