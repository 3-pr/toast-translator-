<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Translator - Link Generator</title>
    <link rel="stylesheet" href="/static/style.css?v=0.2.6">
    <script src="/static/utils.js?v=0.2.6"></script>
    <script src="/static/stremio.js?v=0.2.6"></script>
    <script src="/static/addonCard.js?v=0.2.6"></script>
    <script src="/static/installer.js?v=0.2.6"></script>
</head>

<body>
    <div class="container">
        <div class="title">
            <span class="toast">Toast</span>
            <span class="translator">Translator</span>
        </div>
        <div class="description">
            <p>🧩 Addon Link Generator</p>
        </div>

        <div class="config-group">
            <label for="tmdb-key">🔑 TMDB API Key</label>
            <input type="text" id="tmdb-key" placeholder="Enter your TMDB API key">

            <label for="language">🌍 Preferred Language</label>
            <select id="language"></select>
            <script src="/static/languages.js"></script>

            <!-- BetterPoster Advanced Options -->
            <div class="better-poster-config">
                <h3 style="margin-top:0; color: var(--accent); display: flex; align-items: center; gap: 10px;">
                    🖼️ BetterPoster Options
                </h3>
                
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border);">
                    <input type="checkbox" id="better-poster-enabled" checked style="width: 20px; height: 20px; cursor: pointer;">
                    <label for="better-poster-enabled" style="margin:0; cursor: pointer; font-weight: 600;">Enable BetterPoster API</label>
                </div>

                <div id="better-poster-options" style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="bp-average" checked> <label for="bp-average">Average</label>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="bp-rating" checked> <label for="bp-rating">Rating</label>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="bp-genre" checked> <label for="bp-genre">Genre</label>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="bp-quality" checked> <label for="bp-quality">Quality</label>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="bp-trend" checked> <label for="bp-trend">Trend Tags</label>
                        </div>
                    </div>

                    <div style="margin-top: 10px;">
                        <label>⭐ Rating Source</label>
                        <select id="bp-source">
                            <option value="IM">IMDb</option>
                            <option value="TM">TMDB</option>
                            <option value="RT">Rotten Tomatoes</option>
                            <option value="MC">Metacritic</option>
                            <option value="TR">Trakt</option>
                            <option value="LB">Letterboxd</option>
                            <option value="RE">Roger Ebert</option>
                        </select>
                    </div>

                    <div id="poster-preview">
                        <img id="preview-img" src="" style="display: none;">
                        <div id="preview-placeholder" style="padding: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; color: var(--text-muted); text-align: center;">
                            Preview updates automatically
                        </div>
                    </div>
                </div>
            </div>

            <label for="addon-url" style="margin-top: 20px;">🧩 Load Addon from URL</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="addon-url" placeholder="Addon manifest.json URL">
                <button style="width: auto; margin:0;" onclick="loadAddon(document.getElementById('addon-url').value, true, 'generator', true)">Add</button>
            </div>
        </div>

        <div id="addons-container"></div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/" class="generate-link-btn">🔙 Back to Configuration</a>
        </p>
    </div>

    <div class="donation">
        <a href='https://ko-fi.com/S6S71MEJ1N' target='_blank'>
            <img height='36' src='https://storage.ko-fi.com/cdn/kofi4.png?v=6' alt='Support the project' />
        </a>
    </div>

    <script>
        // Shared BetterPoster Logic
        const bpEnabled = document.getElementById('better-poster-enabled');
        const bpOptions = document.getElementById('better-poster-options');
        const previewImg = document.getElementById('preview-img');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const bpIds = ['bp-average', 'bp-rating', 'bp-genre', 'bp-quality', 'bp-trend', 'bp-source'];

        function updatePreview() {
            if (!bpEnabled.checked) {
                previewImg.style.display = 'none';
                previewPlaceholder.style.display = 'block';
                return;
            }

            let path = 'poster-';
            if (document.getElementById('bp-genre').checked) path += 'g';
            if (document.getElementById('bp-quality').checked) path += 'q';
            if (document.getElementById('bp-rating').checked) path += 'r';
            if (document.getElementById('bp-average').checked) path += 'a';
            
            if (path === 'poster-') path = 'poster';

            let params = '?lang=ar';
            if (!document.getElementById('bp-trend').checked) params += '&tag=none';
            const source = document.getElementById('bp-source').value;
            if (source !== 'IM') params += '&rs=' + source;

            const url = `https://btttr.cc/${path}/imdb/poster-default/tt0111161.jpg${params}`;
            previewImg.src = url;
            previewImg.style.display = 'inline-block';
            previewPlaceholder.style.display = 'none';
        }

        bpEnabled.addEventListener('change', () => {
            bpOptions.style.display = bpEnabled.checked ? 'flex' : 'none';
            updatePreview();
        });

        bpIds.forEach(id => {
            document.getElementById(id).addEventListener('change', updatePreview);
        });

        updatePreview();
    </script>
</body>
</html>
